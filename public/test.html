<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VideoDropTracker 테스트</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
    h1 { color: #333; }
    .info { background: #f0f0f0; padding: 16px; border-radius: 8px; margin: 20px 0; }
    .info code { background: #ddd; padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>VideoDropTracker 테스트 페이지</h1>

  <div class="info">
    <p><strong>테스트 방법:</strong></p>
    <ol>
      <li>아래 영상을 재생하세요</li>
      <li>몇 초간 시청한 후 다른 탭으로 전환하세요</li>
      <li>Supabase 대시보드에서 <code>view_sessions</code> 테이블을 확인하세요</li>
    </ol>
  </div>

  <iframe
    width="560"
    height="315"
    src="https://www.youtube.com/embed/dQw4w9WgXcQ"
    frameborder="0"
    allowfullscreen>
  </iframe>

  <script src="/snippet.js" data-api="http://localhost:3000/api/track" async></script>
</body>
</html>
